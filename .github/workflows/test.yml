name: Test and Verify

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Build analytics bundle
        run: npm run build

      - name: Verify analytics/dist is fresh
        run: |
          git diff --exit-code -- analytics/dist || \
            (echo "analytics/dist is stale. Run: npm run build" && exit 1)

      - name: Verify ProjectHub.js is up to date
        run: |
          cp ProjectHub.js ProjectHub.js.committed
          cat data.js utils.js logic.js ui.js > ProjectHub.js
          diff -q ProjectHub.js.committed ProjectHub.js || (echo "ProjectHub.js is out of date. Run: cat data.js utils.js logic.js ui.js > ProjectHub.js" && exit 1)

      - name: Check server syntax
        run: node --check server-gemini.js

      - name: Check analytics bundle syntax
        run: node --check analytics/dist/analytics.iife.js

      - name: Run cost ledger unit tests
        run: npm run test:ledger

      - name: Run retrieval unit tests
        run: node --test test/bm25.test.js test/query-understanding.test.js test/vector-index.test.js test/hybrid-retrieve.test.js

      - name: Run retrieval evaluation
        run: node scripts/eval-retrieval.js

      - name: Verify retrieval quality threshold
        run: |
          OUTPUT=$(node scripts/eval-retrieval.js 2>&1)
          echo "$OUTPUT"
          RECALL=$(echo "$OUTPUT" | grep -oP 'Recall@6=\K[0-9.]+' | head -1)
          if [ -z "$RECALL" ]; then
            echo "Could not parse Recall@6 from eval output"
            exit 1
          fi
          PASS=$(node -e "console.log(parseFloat('$RECALL') >= 0.90 ? 'true' : 'false')")
          if [ "$PASS" != "true" ]; then
            echo "Retrieval quality regression: Recall@6=$RECALL (threshold: 0.90)"
            exit 1
          fi
          echo "Retrieval quality OK: Recall@6=$RECALL"

      - name: Validate knowledge JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('data/recruiter-knowledge.json','utf8'))" || \
            (echo "data/recruiter-knowledge.json is invalid JSON" && exit 1)
          node -e "
            const d = JSON.parse(require('fs').readFileSync('data/recruiter-knowledge.json','utf8'));
            const required = ['bio','skills','projects','experience'];
            const keys = Object.keys(d);
            const missing = required.filter(k => !keys.includes(k));
            if (missing.length > 0) { console.error('Missing required keys:', missing); process.exit(1); }
            console.log('Knowledge JSON schema OK');
          "

      - name: Check for committed secrets
        run: |
          SECRETS=$(grep -rnE "(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|AIza[a-zA-Z0-9_-]{35})" \
            --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" --include="*.env" \
            --exclude-dir=node_modules --exclude-dir=.git . || true)
          if [ -n "$SECRETS" ]; then
            echo "Found potential secrets in committed files:"
            echo "$SECRETS"
            exit 1
          fi

      - name: Check staging does not point at production
        run: |
          # index.html must not hardcode the production widget URL for dev host
          if grep -q 'src="https://bradleymatera.github.io/ProjectHub/ProjectHub.js' index.html && \
             ! grep -q 'projecthub-dev' index.html; then
            echo "index.html hardcodes production widget URL without dev fallback"
            exit 1
          fi
          echo "Staging routing check passed"

      - name: Check embeddings freshness
        run: |
          if [ ! -f data/knowledge-vectors.json ]; then
            echo "No knowledge-vectors.json — skipping freshness check"
            exit 0
          fi
          KNOWLEDGE_HASH=$(node -e "const crypto=require('crypto');const fs=require('fs');const d=fs.readFileSync('data/recruiter-knowledge.json');console.log(crypto.createHash('sha256').update(d).digest('hex'))")
          VECTORS_HASH=$(node -e "const d=JSON.parse(require('fs').readFileSync('data/knowledge-vectors.json','utf8'));console.log(d.knowledgeHash||'missing')")
          if [ "$KNOWLEDGE_HASH" != "$VECTORS_HASH" ]; then
            echo "WARNING: knowledge-vectors.json is stale (knowledge hash mismatch)"
            echo "  knowledge.json: $KNOWLEDGE_HASH"
            echo "  vectors.json:   $VECTORS_HASH"
            echo "  Run: npm run build:embeddings"
            # Non-blocking warning for now — vectors may not be committed yet
          else
            echo "Embeddings are fresh ✓"
          fi

      - name: Check that new fetch call sites are metered
        run: |
          # Allowlist: all fetch() calls in server-gemini.js must either be to a
          # metered function, a provider caller that meters internally, or an
          # explicitly exempt URL. This check is intentionally narrow and will
          # need updating when new unmetered endpoints are intentionally added.
          UNMETERED=$(grep -nE "fetch\(\`" server-gemini.js | grep -vE "OLLAMA_URL|fetchKnowledge|pushLearnedToGitHub|pushRes = await fetch|metaRes = await fetch|api\.github\.com|embedQuery|chat/completions|api\.cloudflare\.com/client/v4/accounts|generativelanguage\.googleapis\.com" || true)
          if [ -n "$UNMETERED" ]; then
            echo "Found fetch() calls not obviously metered in server-gemini.js:"
            echo "$UNMETERED"
            exit 1
          fi

      # Live tests are run manually against the deployed backend.
      # Uncomment the next step only after adding a safe test endpoint or mock.
      # - name: Run local test suites
      #   run: python3 test-conversation.py --url http://localhost:3000/api/chat
