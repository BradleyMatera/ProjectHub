name: Sync to Staging Repo


on:
  push:
    branches: [develop]
    paths-ignore:
      - 'README.md'
      - 'AGENTS.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      sync:
        description: 'Sync the develop branch to ProjectHub-dev' 
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop

      - name: Configure Git for Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Push to ProjectHub-dev
        env:
          GITHUB_TOKEN_PROJECTHUB_DEV: ${{ secrets.GITHUB_TOKEN_PROJECTHUB_DEV }}
        run: |
          if [ -z "$GITHUB_TOKEN_PROJECTHUB_DEV" ]; then
            echo "GITHUB_TOKEN_PROJECTHUB_DEV secret not set — skipping staging sync (push manually if needed)"
            exit 0
          fi
          git remote add projecthub-dev https://x-access:${GITHUB_TOKEN_PROJECTHUB_DEV}@github.com/BradleyMatera/ProjectHub-dev.git
          git push projecthub-dev develop:main --force

      - name: Restore staging AGENTS.md
        env:
          GITHUB_TOKEN_PROJECTHUB_DEV: ${{ secrets.GITHUB_TOKEN_PROJECTHUB_DEV }}
        run: |
          if [ -z "$GITHUB_TOKEN_PROJECTHUB_DEV" ]; then
            exit 0
          fi
          git fetch projecthub-dev main
          git checkout -B staging-main FETCH_HEAD
          if [ -f .github/staging-AGENTS.md ]; then
            cp .github/staging-AGENTS.md AGENTS.md
            git add AGENTS.md
            git commit -m "Apply staging AGENTS.md" || true
            git push projecthub-dev HEAD:main --force-with-lease
          fi