name: Sync to Staging Repo

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'README.md'
      - 'AGENTS.md'
      - 'docs/**'
      - 'PROJECTHUB-DEVELOPMENT-AND-RELEASE-SPEC.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Prepare staging tree
        run: |
          # Replace AGENTS.md with staging-specific version
          if [ -f .github/staging-AGENTS.md ]; then
            cp .github/staging-AGENTS.md AGENTS.md
          fi

          # Install staging Pages workflow (triggers on main, not master)
          mkdir -p .github/workflows
          if [ -f .github/staging-pages.yml ]; then
            cp .github/staging-pages.yml .github/workflows/pages.yml
          fi

          # Generate source marker
          COMMIT_SHA=$(git rev-parse HEAD)
          cat > STAGING-SOURCE.json << 'ENDJSON'
          {
            "sourceRepository": "BradleyMatera/ProjectHub",
            "sourceBranch": "develop",
            "sourceCommit": "COMMIT_SHA_PLACEHOLDER",
            "generatedBy": "sync-staging.yml"
          }
          ENDJSON
          sed -i "s/COMMIT_SHA_PLACEHOLDER/$COMMIT_SHA/" STAGING-SOURCE.json

          # Stage all changes
          git add -A
          git commit -m "Staging sync from develop@${COMMIT_SHA:0:7}" || true

      - name: Push to ProjectHub-dev
        env:
          PROJECTHUB_DEV_TOKEN: ${{ secrets.PROJECTHUB_DEV_TOKEN }}
        run: |
          if [ -z "$PROJECTHUB_DEV_TOKEN" ]; then
            echo "PROJECTHUB_DEV_TOKEN secret not set — skipping staging sync"
            echo "To sync manually: git push projecthub-dev develop:main --force"
            exit 0
          fi
          git remote add projecthub-dev https://x-access:${PROJECTHUB_DEV_TOKEN}@github.com/BradleyMatera/ProjectHub-dev.git
          git push projecthub-dev HEAD:main --force