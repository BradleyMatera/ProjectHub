name: Deploy ProjectHub Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: projecthub-staging-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: staging
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging artifact
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload staging site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy staging Pages
        id: deployment
        uses: actions/deploy-pages@v4
